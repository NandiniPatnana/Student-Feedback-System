<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Feedback</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
        padding: 20px;
    }
    form {
        background: white;
        width: 450px;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 1px 1px 5px #aaa;
    }
    label, h3 {
        display: block;
        margin-top: 15px;
        margin-bottom: 5px;
        font-weight: bold;
    }
    input, select, textarea {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        box-sizing: border-box;
    }
    input[type="submit"] {
        width: auto;
        padding: 8px 20px;
        cursor: pointer;
        margin-top: 10px;
    }
</style>
</head>
<body>

<h2 align="center">Student Feedback Form</h2>

<form action="feedback" method="post">
    <label>Student Name:</label>
    <input type="text" name="sname">

    <label>Department:</label>
    <select name="department">
        <option>CSE</option>
        <option>ECE</option>
        <option>EEE</option>
        <option>MECH</option>
        <option>CIVIL</option>
    </select>

    <label>Faculty Name:</label>
    <input type="text" name="fname">

    <h3>Rate Your Faculty (1 to 5)</h3>
    <label>1. Gives Clear Notes?</label>
    <input type="number" name="q1" min="1" max="5">

    <label>2. Explains with Examples?</label>
    <input type="number" name="q2" min="1" max="5">

    <label>3. Follows Syllabus Properly?</label>
    <input type="number" name="q3" min="1" max="5">

    <label>4. Comes to Class on Time?</label>
    <input type="number" name="q4" min="1" max="5">

    <label>Overall Feedback:</label>
    <textarea name="comments" rows="4"></textarea>

    <input type="submit" value="Submit Feedback">
</form>

</body>
</html>
